version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: event-booking-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin_pass
      POSTGRES_DB: event_booking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: event-booking-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
